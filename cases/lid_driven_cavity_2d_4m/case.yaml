# ============================================================================
# Schema version — bumped on ANY breaking change to this file's field set.
schema_version: 2

# ============================================================================
# 2D lid-driven cavity — V0 4M-particle benchmark.


time:
  total: null                 # no time budget — run until window closed
  max_steps: null
  output_cadence: null

physics:
  dimension: 2
  h: 0.0025                    # kernel SUPPORT radius (Wendland C4: W(r>=h)=0)
  particle_radius: 0.00025     # particle "radius"; diameter dx = 2·r
  lattice: grid
  calibrate_volume: true
  speed_of_sound: 100.0        # c0 ≈ 20·U_lid (Ma≈0.05) — soft EOS for stability
  power: 7                  # γ in Tait
  cfl: 0.15                 # dt = CFL·h/c0 = 3.75e-6 s
  gravity: [0.0, 0.0, 0.0]    # cavity has no body force

numerics:
  use_density_diffusion: true       # δ term in dρ/dt; false = vanilla WCSPH continuity
  delta_coefficient: 0.1

  use_kcg_correction: true         # false = identity M⁻¹ + zero ∇ρ (plain δ-SPH)
  regularization:
    xi: 0.1
    det_threshold: 1.0e-4
    frobenius_max: 10.0

  use_pst: true                     # particle shifting (main + anti)
  pst_main: 0.1
  pst_anti: 0.0005

  defrag_enabled: true              # CPU-side: dispatch defrag at all?
  defrag_cadence: 1000              # steps between defrag dispatches (also runs once at boot)
  use_prefix_sum_defrag: false      # base-index strategy: false = atomicAdd, true = prefix sum (deterministic)

capacities:
  pool_size: 4800000
  max_per_voxel: 96
  max_incoming: 16
  workgroup: 128

material_library: ../../materials/standard.yaml

geometry:
  frame: frame.obj
  particles:
    - {file: domain.obj,   material: stick_water}
    - {file: wall.obj,     material: stick_wall}
    - {file: wall_top.obj, material: stick_lid}
