schema_version: 2

# 2D lid-driven cavity — 90.0M-particle case.
# GENERATED by utils/geometry/_demo_cavity_case.py — same 4-part split as
# cases/lid_driven_cavity_2d:
#   frame    = bounding box of the 1 m x 1 m cavity
#   domain   = 90,003,169 fluid particles filling the cavity interior
#   wall     = 313,555 static U-shaped wall (bottom + two sides + top corners), 11 layers
#   wall_top = 104,357 lid particles (top, 11 layers); stick_lid has initial_velocity=[1,0,0]
# h = 0.000527, dx = 0.000105 -> h/dx = 5.

time:
  total: null
  max_steps: null
  output_cadence: null

physics:
  dimension: 2
  h: 0.000527
  particle_radius: 0.000053
  lattice: grid
  calibrate_volume: true
  speed_of_sound: 100.0
  power: 7
  cfl: 0.15
  gravity: [0.0, 0.0, 0.0]

numerics:
  use_density_diffusion: true
  delta_coefficient: 0.1
  use_kcg_correction: true
  regularization:
    xi: 0.1
    det_threshold: 1.0e-4
    frobenius_max: 10.0
  use_pst: true
  pst_main: 0.1
  pst_anti: 0.0005
  defrag_enabled: true
  defrag_cadence: 1000
  use_prefix_sum_defrag: false

capacities:
  pool_size: 103984256
  max_per_voxel: 96
  max_incoming: 16
  workgroup: 128

material_library: ../../materials/standard.yaml

geometry:
  frame: frame.obj
  particles:
    - {file: domain.obj,   material: stick_water}
    - {file: wall.obj,     material: stick_wall}
    - {file: wall_top.obj, material: stick_lid}
