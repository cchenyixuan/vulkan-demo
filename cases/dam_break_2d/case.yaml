# ============================================================================
# Schema version — bumped on ANY breaking change to this file's field set.
# The loader (utils/sph/case.py) rejects mismatches hard; migrate explicitly.
schema_version: 2

# ============================================================================
# 2D dam break — V0 fixture case.
#
# This case file is the single source of truth for one simulation run:
# physics, numerics, capacities, and references to geometry / materials.
#
# What's HERE:
#   - All physics + numerical parameters that drive spec constants
#   - Capacities (pool size, per-voxel limits, workgroup)
#   - Material library reference + per-obj material assignment
#   - Geometry file references (vertex-as-particle .obj)
#
# What's DERIVED at solver init (NOT in this file):
#   - timestep            = cfl · smoothing_length / speed_of_sound
#   - kernel coefficients = f(smoothing_length, dimension)  [Wendland C4]
#   - eps_h_squared       = 0.01 · smoothing_length^2
#   - grid origin + dim   = f(frame.obj bbox + smoothing_length + margin)
#   - eos_constant        = speed_of_sound^2 · rest_density / power
#   - per-material radius / volume = f(particle_spacing, dimension)   (V0: uniform)
#
# What's in the .obj files:
#   - frame.obj:    vertices defining computation domain bounding box
#                   (V0: only the bbox is used; interior assumed full)
#   - domain.obj:   vertex-as-particle, fluid initial positions
#   - boundary.obj: vertex-as-particle, static wall positions
# ============================================================================

time:
  # Two independent stopping budgets; simulator halts when EITHER is first hit.
  # Set to null (or omit) to disable a budget. Both null → run until Ctrl-C.
  total: 2.0                 # physical time in seconds, or null = unlimited
  max_steps: null            # integer step cap, or null = unlimited
  output_cadence: 0.01       # snapshot interval in seconds; null = no snapshots (V0: not yet wired)

physics:
  dimension: 2               # 2 → 2D (z = 0); 3 → 3D
  h: 0.025                   # kernel SUPPORT radius (Wendland C4: W(r>=h)=0)
  particle_radius: 0.0025    # particle "radius"; diameter dx = 2·r used for volume = dx^DIM
  speed_of_sound: 300.0      # c0 (artificial; sets stiffness of Tait EOS)
  power: 7.0                 # γ in Tait EOS
  cfl: 0.15                  # for dt derivation
  gravity: [0.0, -9.81, 0.0]

numerics:
  delta_coefficient: 0.1     # δ in δ-SPH density diffusion
  pst_main: 0.1              # PST main-shift scale (Sun 2017 δ-plus empirical, typical 0.1)
  pst_anti: 0.005            # PST anti-shift (cohesion) multiplier
  regularization:
    xi: 0.1                  # KCG Tikhonov diagonal add
    det_threshold: 1.0e-4    # below this → fall back to identity M⁻¹
    frobenius_max: 10.0      # cap |M⁻¹|_F to avoid blow-up

capacities:
  pool_size: 200000          # max active particles
  max_per_voxel: 96          # MAX_PARTICLES_PER_VOXEL
  max_incoming: 16           # MAX_INCOMING_PER_VOXEL
  workgroup: 128             # WORKGROUP_SIZE for compute dispatch

material_library: ../../materials/standard.yaml

geometry:
  frame: frame.obj           # bbox source for grid origin + dimensions
  particles:
    - file: domain.obj
      material: water
    - file: boundary.obj
      material: wall
